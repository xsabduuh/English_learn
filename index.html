<div class="toast-container" id="toast-container"></div>
<div id="feedback" class="feedback"></div>

<script src="data.js"></script>
<script>
'use strict';

// =========================================================
// STORAGE LAYER
// =========================================================
const SK = {
  LEVEL:    'eng_level',
  PLACED:   'eng_placed',
  REVIEWS:  'eng_reviews',
  MISTAKES: 'eng_mistakes',
  GOALS:    'eng_goals',
  STATS:    'eng_stats',
  LAST:     'eng_last',
  ACHIEVE:  'eng_achieve',
  STORIES:  'eng_stories',
};

function sg(k, d) {
  try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; }
  catch { return d; }
}
function ss(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

// =========================================================
// GLOBAL STATE
// =========================================================
let state = {
  tab: 'home',
  userLevel: sg(SK.LEVEL, 'A1'),
  placed: sg(SK.PLACED, false),
  reviews: sg(SK.REVIEWS, {}),
  mistakes: sg(SK.MISTAKES, {}),
  goals: sg(SK.GOALS, null),
  stats: sg(SK.STATS, defaultStats()),
  last: sg(SK.LAST, null),
  achieve: sg(SK.ACHIEVE, defaultAchieve()),
  stories: sg(SK.STORIES, {}),
  // Transient
  learnLevel: null,
  learnContent: 'words',
  quizSession: null,
  currentStory: null,
};

function defaultStats() {
  return { wordsLearned:0, grammarLearned:0, storiesRead:0, exercises:0, correct:0, wrong:0 };
}

function defaultAchieve() {
  return { xp:0, level:1, streak:0, maxStreak:0, lastDate:'', wordsMastered:0, grammarMastered:0, storiesCompleted:0, badges:[] };
}

function save() {
  ss(SK.LEVEL, state.userLevel);
  ss(SK.PLACED, state.placed);
  ss(SK.REVIEWS, state.reviews);
  ss(SK.MISTAKES, state.mistakes);
  ss(SK.GOALS, state.goals);
  ss(SK.STATS, state.stats);
  ss(SK.LAST, state.last);
  ss(SK.ACHIEVE, state.achieve);
  ss(SK.STORIES, state.stories);
}

// =========================================================
// DAILY GOALS ENGINE
// =========================================================
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function ensureGoals() {
  const today = todayStr();
  if (!state.goals || state.goals.date !== today) {
    state.goals = {
      date: today,
      wordsLearned: 0,
      reviewed: 0,
      exercisesDone: 0,
      storiesRead: 0,
      target: 10,
    };
    // Update streak
    const ach = state.achieve;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    if (ach.lastDate === yStr) {
      ach.streak++;
    } else if (ach.lastDate !== today) {
      ach.streak = ach.lastDate ? 0 : ach.streak;
    }
    if (ach.streak > ach.maxStreak) ach.maxStreak = ach.streak;
    save();
  }
}

function goalProgress() {
  ensureGoals();
  const g = state.goals;
  const done = g.wordsLearned + g.reviewed + g.exercisesDone + g.storiesRead;
  const total = g.target;
  return Math.min(100, Math.round((done / total) * 100));
}

function addGoal(type, amt = 1) {
  ensureGoals();
  state.goals[type] = (state.goals[type] || 0) + amt;
  state.achieve.lastDate = todayStr();
  save();
}

// =========================================================
// XP & ACHIEVEMENTS
// =========================================================
function addXP(amt) {
  const ach = state.achieve;
  ach.xp += amt;
  const needed = ach.level * 200;
  if (ach.xp >= needed) {
    ach.level++;
    showToast(`🎉 ترقية! أنت الآن المستوى ${ach.level}`, 'info');
  }
  save();
  checkBadges();
}

const BADGES = [
  { id:'first_word', label:'أول كلمة', icon:'⭐', check: a => a.wordsMastered >= 1 },
  { id:'ten_words', label:'10 كلمات', icon:'📚', check: a => a.wordsMastered >= 10 },
  { id:'fifty_words', label:'50 كلمة', icon:'🏅', check: a => a.wordsMastered >= 50 },
  { id:'hundred_words', label:'100 كلمة', icon:'🥇', check: a => a.wordsMastered >= 100 },
  { id:'first_story', label:'أول قصة', icon:'📖', check: a => a.storiesCompleted >= 1 },
  { id:'five_stories', label:'5 قصص', icon:'📕', check: a => a.storiesCompleted >= 5 },
  { id:'streak3', label:'3 أيام متواصلة', icon:'🔥', check: a => a.streak >= 3 },
  { id:'streak7', label:'7 أيام متواصلة', icon:'🔥🔥', check: a => a.streak >= 7 },
  { id:'xp500', label:'500 نقطة XP', icon:'💎', check: a => a.xp >= 500 },
  { id:'xp1000', label:'1000 نقطة XP', icon:'💠', check: a => a.xp >= 1000 },
];

function checkBadges() {
  const ach = state.achieve;
  BADGES.forEach(b => {
    if (!ach.badges.includes(b.id) && b.check(ach)) {
      ach.badges.push(b.id);
      showToast(`🏆 شارة جديدة: ${b.label}`, 'info');
    }
  });
}

// =========================================================
// REVIEW ENGINE (SM2-like)
// =========================================================
function getReview(id) {
  return state.reviews[id] || { correct: 0, wrong: 0, ease: 2.5, interval: 1, next: 0 };
}

function updateReview(id, correct) {
  const r = getReview(id);
  if (correct) {
    r.correct++;
    r.ease = Math.max(1.3, r.ease + 0.1);
    r.interval = r.interval < 1 ? 1 : Math.round(r.interval * r.ease);
  } else {
    r.wrong++;
    r.ease = Math.max(1.3, r.ease - 0.2);
    r.interval = 1;
  }
  r.next = Date.now() + r.interval * 86400000;
  state.reviews[id] = r;
}

function getDueCount() {
  const now = Date.now();
  return Object.entries(state.reviews).filter(([,r]) => r.next <= now).length;
}

function getDueItems() {
  const now = Date.now();
  const level = state.userLevel;
  const data = APP_DATA[level];
  const due = [];
  data.words.forEach(w => {
    const rid = `${level}_w_${w.id}`;
    const r = state.reviews[rid];
    if (r && r.next <= now) due.push({ ...w, _rid: rid, _type: 'word' });
  });
  data.grammar.forEach(g => {
    const rid = `${level}_g_${g.id}`;
    const r = state.reviews[rid];
    if (r && r.next <= now) due.push({ ...g, _rid: rid, _type: 'grammar' });
  });
  return due.slice(0, 20);
}

// =========================================================
// MISTAKES ENGINE
// =========================================================
function addMistake(id, type, details) {
  const m = state.mistakes[id] || { id, type, count: 0, details };
  m.count++;
  m.details = details;
  m.last = todayStr();
  state.mistakes[id] = m;
  save();
}

function getMistakes() {
  return Object.values(state.mistakes).sort((a,b) => b.count - a.count);
}

// =========================================================
// EXERCISE GENERATOR
// =========================================================
function makeExercises(items, count = 10) {
  const types = ['translate', 'fill', 'order', 'correct', 'write'];
  const exercises = [];
  const shuffled = shuffle([...items]).slice(0, count);
  
  shuffled.forEach((item, i) => {
    if (!item.word) return; // skip non-words for now
    const type = types[i % types.length];
    const wrong = getWrongOptions(items, item.word, 3);
    
    switch(type) {
      case 'translate':
        exercises.push({
          type: 'mc',
          question: `ما معنى الكلمة: "${item.word}"`,
          correct: item.translation,
          options: shuffle([item.translation, ...wrong.map(w=>w.translation)]),
          hint: item.example,
          itemId: item.id,
        });
        break;
      case 'fill':
        const blanked = item.example.replace(new RegExp(item.word, 'gi'), '___');
        exercises.push({
          type: 'mc',
          question: `أكمل الجملة:\n"${blanked}"`,
          correct: item.word,
          options: shuffle([item.word, ...wrong.map(w=>w.word)]),
          hint: `الترجمة: ${item.translation}`,
          itemId: item.id,
        });
        break;
      case 'order':
        const words = item.example.split(' ');
        if (words.length < 3) {
          exercises.push({
            type: 'write',
            question: `اكتب الكلمة الإنجليزية لـ: "${item.translation}"`,
            correct: item.word,
            hint: item.example,
            itemId: item.id,
          });
        } else {
          exercises.push({
            type: 'order',
            question: `رتّب الكلمات لتكوين جملة صحيحة:`,
            correct: item.example,
            words: shuffle([...words]),
            hint: `تلميح: ${item.translation}`,
            itemId: item.id,
          });
        }
        break;
      case 'correct':
        const wrongWord = wrong[0];
        if (wrongWord) {
          const wrongSent = item.example.replace(new RegExp(item.word, 'gi'), wrongWord.word);
          exercises.push({
            type: 'mc',
            question: `أيُّ الجمل صحيحة؟`,
            correct: item.example,
            options: shuffle([item.example, wrongSent]),
            hint: `الكلمة الصحيحة: ${item.word}`,
            itemId: item.id,
          });
        } else {
          exercises.push({
            type: 'write',
            question: `اكتب الكلمة الإنجليزية لـ: "${item.translation}"`,
            correct: item.word,
            hint: item.example,
            itemId: item.id,
          });
        }
        break;
      case 'write':
        exercises.push({
          type: 'write',
          question: `اكتب الكلمة الإنجليزية لـ: "${item.translation}"`,
          correct: item.word,
          hint: item.example,
          itemId: item.id,
        });
        break;
    }
  });
  return exercises.filter(Boolean);
}

function getWrongOptions(pool, correctWord, n) {
  const others = pool.filter(w => w.word && w.word !== correctWord);
  return shuffle(others).slice(0, n);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// =========================================================
// PLACEMENT TEST ENGINE
// =========================================================
function buildPlacement() {
  const qs = [];
  APP_LEVELS.forEach(lvl => {
    const data = APP_DATA[lvl];
    shuffle([...data.quizzes]).slice(0, 5).forEach(q => qs.push({ ...q, level: lvl }));
  });
  return shuffle(qs);
}

function scorePlacement(answers, questions) {
  let correct = 0;
  const levelScores = { A1: 0, A2: 0, B1: 0, B2: 0 };
  const levelTotals = { A1: 0, A2: 0, B1: 0, B2: 0 };
  questions.forEach((q, i) => {
    levelTotals[q.level]++;
    if (answers[i] === q.answer) { correct++; levelScores[q.level]++; }
  });
  const pct = Math.round((correct / questions.length) * 100);
  let level = 'A1';
  if (pct >= 80) level = 'B2';
  else if (pct >= 60) level = 'B1';
  else if (pct >= 40) level = 'A2';
  return { correct, total: questions.length, pct, level, levelScores, levelTotals };
}

// =========================================================
// SPEECH ENGINE
// =========================================================
let speechAvail = 'speechSynthesis' in window;

function speak(text) {
  if (!speechAvail) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}

// =========================================================
// WORD DICTIONARY LOOKUP
// =========================================================
function findWord(wordText) {
  for (const lvl of APP_LEVELS) {
    const found = APP_DATA[lvl].words.find(w => w.word.toLowerCase() === wordText.toLowerCase());
    if (found) return found;
  }
  return null;
}

// =========================================================
// TOAST & FEEDBACK
// =========================================================
function showToast(msg, type = 'info') {
  const icons = { info: '⭐', success: '✅', error: '❌' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'💡'}</span> ${msg}`;
  const c = document.getElementById('toast-container');
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(-8px)'; el.style.transition = 'all 0.3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

function showFeedback(correct) {
  const el = document.getElementById('feedback');
  el.className = `feedback ${correct ? 'correct' : 'wrong'}`;
  el.textContent = correct ? '✅ ممتاز!' : '❌ خطأ';
  el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); el.classList.add('hide'); setTimeout(() => { el.classList.remove('hide'); }, 300); }, 1200);
}

// =========================================================
// NAVIGATION
// =========================================================
function navTo(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  const sc = document.getElementById('screen');
  switch(tab) {
    case 'home':     sc.innerHTML = renderHome(); break;
    case 'learn':    sc.innerHTML = renderLearn(); break;
    case 'stories':  sc.innerHTML = renderStories(); break;
    case 'progress': sc.innerHTML = renderProgress(); break;
    case 'profile':  sc.innerHTML = renderProfile(); break;
  }
  sc.scrollTop = 0;
}

// =========================================================
// HOME SCREEN
// =========================================================

  const due = getDueCount();
  const mistakes = getMistakes().length;
  const data = APP_DATA[state.userLevel];
  const levelLabel = APP_LEVEL_LABELS[state.userLevel].split(' - ')[1];
  const progressItems = state.goals;

  return `
  <div class="page">
    <!-- Top Bar -->
    <div class="top-bar">
      <span class="top-bar-title">أهلاً بك 👋</span>
      <div class="badge-pill gold">
        <span class="material-symbols-rounded icon">star</span>
        ${ach.xp} XP
      </div>
      <div class="badge-pill red">
        <span class="material-symbols-rounded icon">local_fire_department</span>
        ${ach.streak}
      </div>
    </div>

    <!-- Hero -->
    <div style="padding: 0 16px 10px">
      <div class="home-hero">
        <h1>تعلم الإنجليزية 🇬🇧</h1>
        <div class="subtitle">${APP_LEVEL_LABELS[state.userLevel]}</div>
        <div class="streak-display">
          <span class="streak-flame">🔥</span>
          <span>${ach.streak} ${ach.streak === 1 ? 'يوم' : 'أيام'} متواصل${ach.streak === 1 ? '' : 'ة'}</span>
          ${ach.streak >= 3 ? '• رائع!' : ''}
        </div>
      </div>
    </div>

    <!-- Daily Goal -->
    <div style="padding: 0 16px 10px">
      <div class="goal-card">
        <div class="goal-row">
          <span class="material-symbols-rounded goal-icon">track_changes</span>
          <span class="goal-title">هدف اليوم</span>
          <span class="goal-pct">${pct}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="goal-stats">
          <span>📖 ${progressItems.wordsLearned} كلمة</span>
          <span>🔄 ${progressItems.reviewed} مراجعة</span>
          <span>✏️ ${progressItems.exercisesDone} تمرين</span>
          <span>📚 ${progressItems.storiesRead} قصة</span>

      </div>
    </div>

    <!-- Quick Actions -->
    <div style="padding: 0 16px 10px">
      <div class="quick-grid">
        <div class="quick-btn" onclick="startWordCards()">

        </div>
        <div class="quick-btn" onclick="startQuiz()">

        </div>
        <div class="quick-btn" onclick="navTo('stories')">
          <span class="icon">📖</span>
          <span class="label">قصص</span>
        </div>
        <div class="quick-btn" onclick="navTo('progress')">
          <span class="icon">📊</span>
          <span class="label">تقدمي</span>
        </div>
      </div>
    </div>

    <!-- Continue / Review -->
    ${due > 0 ? `

      <div class="alert-row review" onclick="startReview()">
        <span class="material-symbols-rounded icon gold">replay</span>

      </div>

    ${mistakes > 0 ? `
    <div style="padding: 0 16px 10px">
      <div class="alert-row mistake" onclick="navTo('progress')">

        <span class="material-symbols-rounded chevron">chevron_left</span>
      </div>

    <!-- Big Continue -->
    <div style="padding: 0 16px 10px">
      <button class="btn-continue" onclick="startWordCards()">

function getDailyTip() {
  const tips = [
    'كرر الكلمات الجديدة 3 مرات عند تعلمها لتثبيتها في الذاكرة طويلة الأمد.',
    'احرص على ممارسة اللغة يومياً ولو لـ 15 دقيقة فقط، الاستمرارية هي المفتاح.',
    'عند قراءة القصص، لا تتوقف عند كل كلمة غريبة — حاول فهم المعنى من السياق أولاً.',
    'استمع إلى نطق الكلمات بصوت عالٍ وكرر بعدها لتحسين النطق.',
    'ربط الكلمة الجديدة بصورة ذهنية يساعد على تذكرها بشكل أسرع.',
    'الأخطاء جزء من التعلم — كل خطأ يقربك أكثر من الإتقان!',
    'حاول استخدام الكلمات الجديدة في جمل من تأليفك لتعزيز الحفظ.',
  ];
  const day = new Date().getDay();
  return tips[day % tips.length];
}

// =========================================================
// LEARN SCREEN
// =========================================================
function renderLearn() {
  if (!state.learnLevel) state.learnLevel = state.userLevel;
  const lvl = state.learnLevel;
  const data = APP_DATA[lvl];
  const tab = state.learnContent;

  return `
  <div style="padding:16px">
    <!-- Level selector tabs -->
    <div class="level-tabs">
      ${APP_LEVELS.map(l => `
        <div class="level-tab ${l === lvl ? 'active' : ''}" onclick="setLearnLevel('${l}')">${l}</div>
      `).join('')}
    </div>

    <!-- Content Type tabs -->
    <div class="content-tabs">
      <div class="content-tab ${tab==='words'?'active':''}" onclick="setLearnContent('words')">كلمات</div>
      <div class="content-tab ${tab==='grammar'?'active':''}" onclick="setLearnContent('grammar')">قواعد</div>
      <div class="content-tab ${tab==='dialogues'?'active':''}" onclick="setLearnContent('dialogues')">حوارات</div>
      <div class="content-tab ${tab==='quiz'?'active':''}" onclick="setLearnContent('quiz')">اختبارات</div>
    </div>

    <!-- Action buttons -->
    ${tab === 'words' ? `
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn btn-primary" style="flex:1" onclick="startWordCards('${lvl}')">
          <span class="material-symbols-rounded">style</span> بطاقات
        </button>
        <button class="btn btn-ghost" style="flex:1" onclick="startQuiz('${lvl}')">
          <span class="material-symbols-rounded">quiz</span> تمرين
        </button>
      </div>
    ` : ''}

    ${tab === 'quiz' ? `
      <button class="btn btn-primary" style="margin-bottom:14px" onclick="startQuiz('${lvl}')">
        <span class="material-symbols-rounded">play_arrow</span>
        ابدأ اختبار ${lvl}
      </button>
    ` : ''}

    <!-- Content -->
    ${tab === 'words' ? renderWordList(data.words, lvl) : ''}
    ${tab === 'grammar' ? renderGrammarList(data.grammar) : ''}
    ${tab === 'dialogues' ? renderDialogueList(data.dialogues) : ''}
    ${tab === 'quiz' ? renderQuizList(data.quizzes) : ''}
  </div>`;
}

function renderWordList(words, lvl) {
  const html = words.map(w => {
    const rid = `${lvl}_w_${w.id}`;
    const r = state.reviews[rid];
    const mastered = r && r.correct >= 3;
    const learning = r && r.correct > 0;
    const status = mastered ? 'mastered' : learning ? 'learning' : 'new';
    const statusIcon = mastered ? '✅' : learning ? '🔄' : '🆕';
    return `<div class="word-item ${mastered ? 'mastered' : ''}" onclick="openWordCard(${JSON.stringify(w).replace(/"/g,"'")}, '${lvl}')">
      <span class="word-item-en">${w.word}</span>
      <span class="word-item-ar">${w.translation}</span>
      <span class="word-item-status ${status}">${statusIcon}</span>
    </div>`;
  }).join('');
  return `<div class="word-list">${html}</div>`;
}

function renderGrammarList(grammar) {
  return `<div class="grammar-list">${grammar.map(g => `
    <div class="grammar-item">
      <div class="grammar-rule">${highlightRule(g.rule)}</div>
    </div>
  `).join('')}</div>`;
}

function highlightRule(rule) {
  return rule
    .replace(/\b([A-Z][^:،.]+):/g, '<strong>$1:</strong>')
    .replace(/([a-z]+\s*(?:→|\/)\s*[a-z]+)/gi, '<em style="color:var(--gold)">$1</em>')
    .replace(/\(([^)]+)\)/g, '<span style="color:var(--blue)">($1)</span>');
}

function renderDialogueList(dialogues) {
  return `<div class="dialogue-list">${dialogues.map(d => `
    <div class="dialogue-card">
      <div class="dialogue-line">${formatDialogue(d.dialogue)}</div>
    </div>
  `).join('')}</div>`;
}

function formatDialogue(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('A:')) return `<strong style="color:var(--blue)">A:</strong>${line.slice(2)}`;
    if (line.startsWith('B:')) return `<strong style="color:var(--gold)">B:</strong>${line.slice(2)}`;
    return line;
  }).join('<br>');
}

function renderQuizList(quizzes) {
  return `<div class="word-list">${quizzes.map(q => `
    <div class="word-item" onclick="">
      <span style="font-size:.8rem;flex:1;line-height:1.4">${q.question}</span>
      <span class="word-item-ar" style="max-width:80px;text-align:center;font-size:.75rem;color:var(--gold)">${q.answer}</span>
    </div>
  `).join('')}</div>`;
}

function setLearnLevel(lvl) {
  state.learnLevel = lvl;
  renderTab('learn');
}

function setLearnContent(tab) {
  state.learnContent = tab;
  renderTab('learn');
}

// =========================================================
// WORD CARDS SESSION
// =========================================================
let wcSession = { items: [], index: 0, flipped: false, correct: 0, wrong: 0 };

function openWordCard(wordObj, lvl) {
  // Show single word card inline
  startWordCardsFrom([wordObj], lvl || state.userLevel);
}

function startWordCards(lvl) {
  const level = lvl || state.userLevel;
  const data = APP_DATA[level];
  // Prioritize unlearned words
  const reviews = state.reviews;
  const unlearned = data.words.filter(w => {
    const r = reviews[`${level}_w_${w.id}`];
    return !r || r.correct < 3;
  });
  const items = shuffle(unlearned.length > 0 ? unlearned : data.words).slice(0, 15);
  startWordCardsFrom(items, level);
}

function startWordCardsFrom(items, level) {
  wcSession = { items, level, index: 0, flipped: false, correct: 0, wrong: 0 };
  document.getElementById('bottom-nav').classList.add('hidden');
  renderWordCard();
}

function renderWordCard() {
  const s = wcSession;
  if (s.index >= s.items.length) {
    showWordCardComplete();
    return;
  }
  const w = s.items[s.index];
  const pct = Math.round((s.index / s.items.length) * 100);
  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="page" style="padding:12px">
    <!-- Header -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;cursor:pointer;color:var(--muted);font-size:14px" onclick="endWordCards()">
        <span class="material-symbols-rounded" style="font-size:18px;vertical-align:middle">arrow_forward</span>
      </div>
      <div style="flex:1">
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:3px">${s.index+1} / ${s.items.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;gap:8px;font-size:.8rem;font-weight:700">
        <span style="color:var(--green)">✅ ${s.correct}</span>
        <span style="color:var(--red)">❌ ${s.wrong}</span>
      </div>
    </div>

    <!-- Card -->
    <div class="word-card-container" id="wc" onclick="flipCard()">
      <div class="word-card-inner">
        <div class="word-card-front">
          <div class="word-en">${w.word}</div>
          ${s.flipped ? '' : '<div class="word-hint">اضغط لرؤية الترجمة</div>'}
        </div>
        <div class="word-card-back">
          <div class="word-ar">${w.translation}</div>
          <div class="word-example">"${w.example}"</div>
          <button class="word-speak-btn" onclick="event.stopPropagation();speak('${w.word.replace(/'/g,"\\'")}')">
            <span class="material-symbols-rounded icon">volume_up</span>
            استمع
          </button>
        </div>
      </div>
    </div>

    <!-- Actions shown after flip -->
    <div id="wc-actions" style="display:${s.flipped?'flex':'none'};gap:8px;margin-top:12px">
      <button class="btn word-actions btn-wrong" style="flex:1" onclick="wordResult(false)">
        <span class="material-symbols-rounded">close</span> لا أعرفها
      </button>
      <button class="btn word-actions btn-correct" style="flex:1" onclick="wordResult(true)">
        <span class="material-symbols-rounded">check</span> أعرفها
      </button>
    </div>

    <!-- Skip -->
    ${!s.flipped ? `<button class="btn btn-ghost" style="margin-top:10px;font-size:.85rem" onclick="flipCard()">
      اضغط على البطاقة للكشف
    </button>` : ''}
  </div>`;
}

function flipCard() {
  wcSession.flipped = true;
  document.getElementById('wc').classList.add('flipped');
  document.getElementById('wc-actions').style.display = 'flex';
}

function wordResult(correct) {
  const s = wcSession;
  const w = s.items[s.index];
  const rid = `${s.level}_w_${w.id}`;
  updateReview(rid, correct);
  if (correct) {
    s.correct++;
    addXP(5);
    addGoal('wordsLearned');
    state.stats.wordsLearned++;
    state.stats.correct++;
    state.achieve.wordsMastered++;
  } else {
    s.wrong++;
    state.stats.wrong++;
    addMistake(rid, 'word', { word: w.word, translation: w.translation });
  }
  save();
  s.index++;
  s.flipped = false;
  renderWordCard();
}

function showWordCardComplete() {
  const s = wcSession;
  const total = s.items.length;
  const pct = total > 0 ? Math.round((s.correct / total) * 100) : 0;
  addXP(10); // Bonus for finishing
  addGoal('reviewed', s.correct);
  save();
  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="complete-page">
    <div class="complete-trophy">${pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : '👍'}</div>
    <h2 class="complete-title">${pct >= 80 ? 'ممتاز!' : pct >= 60 ? 'جيد جداً!' : 'أكمل التدريب!'}</h2>
    <p class="complete-subtitle">انتهيت من مراجعة ${total} كلمة</p>
    <div class="xp-gain">+ ${s.correct * 5 + 10} XP</div>
    <div class="complete-stats">
      <div class="complete-stat"><div class="val">${s.correct}</div><div class="lbl">صحيح</div></div>
      <div class="complete-stat"><div class="val">${s.wrong}</div><div class="lbl">خطأ</div></div>
      <div class="complete-stat"><div class="val">${pct}%</div><div class="lbl">الدقة</div></div>
      <div class="complete-stat"><div class="val">${state.achieve.xp}</div><div class="lbl">إجمالي XP</div></div>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" onclick="startWordCards()">
        <span class="material-symbols-rounded">replay</span> جولة أخرى
      </button>
      <button class="btn btn-secondary" onclick="endWordCards()">
        <span class="material-symbols-rounded">home</span> العودة للرئيسية
      </button>
    </div>
  </div>`;
}

function endWordCards() {
  document.getElementById('bottom-nav').classList.remove('hidden');
  navTo(state.tab);
}

// =========================================================
// QUIZ SESSION
// =========================================================
let qSession = { exercises:[], index:0, correct:0, wrong:0, answered:[] };

function startQuiz(lvl) {
  const level = lvl || state.userLevel;
  const data = APP_DATA[level];
  const exercises = makeExercises(data.words, 10);
  if (exercises.length === 0) { showToast('لا توجد تمارين متاحة', 'error'); return; }
  qSession = { exercises, level, index:0, correct:0, wrong:0, answered:[], orderSelected:[] };
  document.getElementById('bottom-nav').classList.add('hidden');
  renderQuizQuestion();
}

function startReview() {
  const due = getDueItems();
  if (due.length === 0) { showToast('لا توجد بنود للمراجعة الآن', 'info'); return; }
  const words = due.filter(d => d.word);
  const exercises = makeExercises(words.length > 0 ? words : APP_DATA[state.userLevel].words, Math.min(due.length, 10));
  qSession = { exercises, level: state.userLevel, index:0, correct:0, wrong:0, answered:[], orderSelected:[], isReview:true };
  document.getElementById('bottom-nav').classList.add('hidden');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const s = qSession;
  if (s.index >= s.exercises.length) {
    showQuizComplete();
    return;
  }
  const q = s.exercises[s.index];
  const pct = Math.round((s.index / s.exercises.length) * 100);
  const dots = s.exercises.map((_, i) => {
    const cls = i < s.index ? (s.answered[i] ? 'done' : 'wrong') : i === s.index ? 'active' : '';
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  let questionHTML = '';
  if (q.type === 'mc') {
    questionHTML = `
      <div class="quiz-card">
        <div class="quiz-question">${q.question.replace(/\n/g,'<br>')}</div>
        <div class="quiz-options" id="opts">
          ${q.options.map(opt => `
            <button class="option-btn" onclick="answerMC(this,'${escQ(opt)}','${escQ(q.correct)}','${escQ(q.itemId)}')">
              ${opt}
            </button>
          `).join('')}
        </div>
        <div class="quiz-hint" style="margin-top:8px">${q.hint||''}</div>
      </div>`;
  } else if (q.type === 'write') {
    questionHTML = `
      <div class="quiz-card">
        <div class="quiz-question">${q.question}</div>
        <div class="quiz-input-wrap">
          <input class="quiz-input" id="write-inp" type="text" placeholder="اكتب إجابتك..." autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter')checkWrite()">
          <button class="btn btn-primary" onclick="checkWrite()">تحقق</button>
        </div>
        <div class="quiz-hint">${q.hint||''}</div>
      </div>`;
  } else if (q.type === 'order') {
    s.orderSelected = [];
    questionHTML = `
      <div class="quiz-card">
        <div class="quiz-question">${q.question}</div>
        <div id="order-selected" style="min-height:44px;background:var(--card2);border:1px dashed var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;direction:ltr"></div>
        <div id="order-pool" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;direction:ltr">
          ${q.words.map((w,i) => `<button class="option-btn btn-sm" style="width:auto" onclick="selectOrderWord(this,'${escQ(w)}',${i})">${w}</button>`).join('')}
        </div>
        <button class="btn btn-primary" onclick="checkOrder('${escQ(q.correct)}','${escQ(q.itemId||'')}')">تحقق</button>
        <button class="btn btn-ghost" style="margin-top:6px;font-size:.8rem" onclick="clearOrder()">إعادة ترتيب</button>
        <div class="quiz-hint">${q.hint||''}</div>
      </div>`;
  }

  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div style="padding:12px">
    <div class="quiz-header" style="margin-bottom:12px">
      <div class="quiz-back" onclick="endQuiz()">
        <span class="material-symbols-rounded">arrow_forward</span>
      </div>
      <div style="flex:1">
        <div class="quiz-progress-text" style="margin-bottom:3px">سؤال ${s.index+1} من ${s.exercises.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="quiz-dots" style="margin-bottom:12px">${dots}</div>
    ${questionHTML}
  </div>`;

  if (q.type === 'write') {
    setTimeout(() => { const inp = document.getElementById('write-inp'); if(inp) inp.focus(); }, 100);
  }
}

function escQ(s) { return (s||'').replace(/'/g,"\\'").replace(/\n/g,' '); }

function answerMC(btn, selected, correct, itemId) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const isCorrect = selected === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    btns.forEach(b => { if(b.textContent.trim() === correct) b.classList.add('correct'); });
  }
  recordAnswer(isCorrect, itemId);
  setTimeout(() => nextQuestion(), 1200);
}

function checkWrite() {
  const inp = document.getElementById('write-inp');
  if (!inp) return;
  const q = qSession.exercises[qSession.index];
  const answer = inp.value.trim();
  const isCorrect = answer.toLowerCase() === q.correct.toLowerCase();
  inp.classList.add(isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;
  if (!isCorrect) {
    inp.value = `${answer} → ${q.correct}`;
  }
  recordAnswer(isCorrect, q.itemId);
  setTimeout(() => nextQuestion(), 1400);
}

let orderWords = [];
function selectOrderWord(btn, word, idx) {
  qSession.orderSelected.push(word);
  btn.disabled = true; btn.style.opacity = '0.4';
  const sel = document.getElementById('order-selected');
  if (sel) sel.innerHTML = qSession.orderSelected.map((w,i) =>
    `<button class="option-btn btn-sm" style="width:auto;background:var(--gold-dim);border-color:var(--gold);color:var(--gold)"
    onclick="unselectOrderWord(this,'${escQ(w)}',${i})">${w}</button>`
  ).join('');
}

function unselectOrderWord(btn, word, selIdx) {
  qSession.orderSelected.splice(selIdx, 1);
  const sel = document.getElementById('order-selected');
  if (sel) sel.innerHTML = qSession.orderSelected.map((w,i) =>
    `<button class="option-btn btn-sm" style="width:auto;background:var(--gold-dim);border-color:var(--gold);color:var(--gold)"
    onclick="unselectOrderWord(this,'${escQ(w)}',${i})">${w}</button>`
  ).join('');
  // Re-enable in pool
  const pool = document.getElementById('order-pool');
  if (pool) {
    const poolBtns = pool.querySelectorAll('button');
    poolBtns.forEach(b => { if (b.textContent.trim() === word && b.disabled) { b.disabled = false; b.style.opacity = '1'; return false; } });
  }
}

function clearOrder() {
  qSession.orderSelected = [];
  const sel = document.getElementById('order-selected');
  if (sel) sel.innerHTML = '';
  const pool = document.getElementById('order-pool');
  if (pool) pool.querySelectorAll('button').forEach(b => { b.disabled = false; b.style.opacity = '1'; });
}

function checkOrder(correct, itemId) {
  const selected = qSession.orderSelected.join(' ');
  const isCorrect = selected.trim() === correct.trim();
  const sel = document.getElementById('order-selected');
  if (sel) sel.style.borderColor = isCorrect ? 'var(--green)' : 'var(--red)';
  if (!isCorrect && sel) {
    sel.innerHTML += `<div style="width:100%;font-size:.8rem;color:var(--green);margin-top:6px">الصحيح: ${correct}</div>`;
  }
  recordAnswer(isCorrect, itemId);
  setTimeout(() => nextQuestion(), 1500);
}

function recordAnswer(isCorrect, itemId) {
  const s = qSession;
  s.answered[s.index] = isCorrect;
  if (isCorrect) {
    s.correct++;
    addXP(10);
    state.stats.correct++;
    showFeedback(true);
    if (itemId) updateReview(`${s.level}_w_${itemId}`, true);
  } else {
    s.wrong++;
    state.stats.wrong++;
    showFeedback(false);
    if (itemId) {
      updateReview(`${s.level}_w_${itemId}`, false);
      const data = APP_DATA[s.level];
      const w = data.words.find(x => x.id === itemId);
      if (w) addMistake(`${s.level}_w_${itemId}`, 'word', { word: w.word, translation: w.translation });
    }
  }
  state.stats.exercises++;
  addGoal('exercisesDone');
  save();
}

function nextQuestion() {
  qSession.index++;
  renderQuizQuestion();
}

function showQuizComplete() {
  const s = qSession;
  const total = s.exercises.length;
  const pct = total > 0 ? Math.round((s.correct / total) * 100) : 0;
  addXP(20);
  save();
  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="complete-page">
    <div class="complete-trophy">${pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : '💪'}</div>
    <h2 class="complete-title">${pct >= 80 ? 'ممتاز جداً!' : pct >= 60 ? 'جيد جداً!' : 'استمر!'}</h2>
    <p class="complete-subtitle">انتهيت من ${total} ${s.isReview ? 'سؤال مراجعة' : 'تمرين'}</p>
    <div class="xp-gain">+ ${s.correct * 10 + 20} XP</div>
    <div class="complete-stats">
      <div class="complete-stat"><div class="val">${s.correct}</div><div class="lbl">صحيح</div></div>
      <div class="complete-stat"><div class="val">${s.wrong}</div><div class="lbl">خطأ</div></div>
      <div class="complete-stat"><div class="val">${pct}%</div><div class="lbl">الدقة</div></div>
      <div class="complete-stat"><div class="val">${state.achieve.xp}</div><div class="lbl">إجمالي XP</div></div>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" onclick="startQuiz()">
        <span class="material-symbols-rounded">replay</span> جولة أخرى
      </button>
      ${s.wrong > 0 ? `<button class="btn btn-ghost" onclick="startReview()">
        <span class="material-symbols-rounded">recycling</span> راجع الأخطاء
      </button>` : ''}
      <button class="btn btn-secondary" onclick="endQuiz()">
        <span class="material-symbols-rounded">home</span> العودة
      </button>
    </div>
  </div>`;
}

function endQuiz() {
  document.getElementById('bottom-nav').classList.remove('hidden');
  navTo(state.tab);
}

function renderStories() {

    APP_DATA[lvl].stories.forEach(s => {

    });

          <div class="story-level">${s.level}</div>

// =========================================================
// STORY READER
// =========================================================
function openStory(storyObj) {
  state.currentStory = storyObj;
  document.getElementById('bottom-nav').classList.add('hidden');
  renderStoryReader();
}

function renderStoryReader() {
  const s = state.currentStory;
  if (!s) { endStory(); return; }
  const key = `${s.level}_${s.id}`;
  const alreadyRead = !!state.stories[key];

  // Build clickable words
  const words = s.story.split(/(\s+)/);
  const storyHTML = words.map(part => {
    if (/^\s+$/.test(part)) return part;
    const clean = part.replace(/[.,!?;:'"]/g, '');
    const wordData = findWord(clean);
    if (wordData) {
      return `<span class="story-word" onclick="showWordTooltip(${JSON.stringify({word:wordData.word,translation:wordData.translation,example:wordData.example}).replace(/"/g,"'").replace(/'/g,"&#39;")})">${part}</span>`;
    }
    return `<span>${part}</span>`;
  }).join('');

  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="story-reader-page">
    <div class="story-reader-header">
      <div class="quiz-back" onclick="endStory()">
        <span class="material-symbols-rounded">arrow_forward</span>
      </div>
      <h2>${s.title || 'قصة'}</h2>
      <div class="badge-pill" style="font-size:.75rem">${s.level}</div>
    </div>

    <div style="background:var(--gold-dim);border:1px solid var(--gold-glow);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:.8rem;color:var(--gold)">
      💡 اضغط على أي كلمة إنجليزية لمعرفة معناها
    </div>

    <div class="story-body" style="direction:ltr;text-align:left">${storyHTML}</div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
      ${!alreadyRead ? `
      <button class="btn btn-primary" onclick="markStoryRead('${key}')">
        <span class="material-symbols-rounded">check_circle</span>
        انتهيت من القراءة ✅
      </button>` : `<div style="text-align:center;color:var(--green);font-weight:700;padding:8px">✅ قرأت هذه القصة من قبل</div>`}
      <button class="btn btn-ghost" onclick="endStory()">
        <span class="material-symbols-rounded">arrow_forward</span>
        العودة للقصص
      </button>
    </div>
  </div>`;
}

function showWordTooltip(wordData) {
  const existing = document.getElementById('word-tooltip');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.id = 'word-tooltip';
  div.className = 'word-tooltip';
  div.innerHTML = `
    <button class="tooltip-close" onclick="document.getElementById('word-tooltip')?.remove()">×</button>
    <div class="tooltip-word">${wordData.word}</div>
    <div class="tooltip-ar">🇸🇦 ${wordData.translation}</div>
    <div class="tooltip-ex">📝 "${wordData.example}"</div>
    <div class="tooltip-actions">
      <button class="btn btn-ghost btn-sm" onclick="speak('${wordData.word.replace(/'/g,"\\'")}');event.stopPropagation()">
        <span class="material-symbols-rounded" style="font-size:16px">volume_up</span> استمع
      </button>
    </div>`;
  document.body.appendChild(div);
  setTimeout(() => {
    document.addEventListener('click', function once(e) {
      if (!div.contains(e.target)) { div.remove(); document.removeEventListener('click', once); }
    });
  }, 100);
}

function markStoryRead(key) {
  state.stories[key] = todayStr();
  addXP(25);
  addGoal('storiesRead');
  state.stats.storiesRead++;
  state.achieve.storiesCompleted++;
  save();
  showToast('✅ أحسنت! +25 XP', 'success');
  renderStoryReader();
}

function endStory() {
  state.currentStory = null;
  document.getElementById('bottom-nav').classList.remove('hidden');
  navTo('stories');
}

// =========================================================
// PROGRESS PAGE
// =========================================================
function renderProgress() {
  const ach = state.achieve;
  const stats = state.stats;
  const mistakes = getMistakes().slice(0, 10);
  const accuracy = (stats.correct + stats.wrong) > 0
    ? Math.round((stats.correct / (stats.correct + stats.wrong)) * 100)
    : 0;
  const xpNeeded = ach.level * 200;
  const xpPct = Math.min(100, Math.round((ach.xp % xpNeeded) / xpNeeded * 100));

  // Level completion stats
  const levelStats = APP_LEVELS.map(lvl => {
    const data = APP_DATA[lvl];
    const total = data.words.length;
    const learned = data.words.filter(w => {
      const r = state.reviews[`${lvl}_w_${w.id}`];
      return r && r.correct >= 1;
    }).length;
    return { lvl, learned, total, pct: Math.round((learned/total)*100) };
  });

  return `
  <div class="progress-page">
    <!-- XP Level -->
    <div class="section-title">المستوى والتقدم</div>
    <div class="level-xp-card">
      <div class="level-row">
        <div class="level-num">المستوى ${ach.level}</div>
        <div class="xp-text">${ach.xp} XP / المستوى التالي بـ ${xpNeeded} XP</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${xpPct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:6px">
        <span>🔥 ${ach.streak} يوم متواصل</span>
        <span>🏅 ${ach.badges.length} شارة</span>
        <span>📚 ${ach.wordsMastered} كلمة</span>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="section-title">الإحصائيات</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📖</div>
        <span class="stat-val">${stats.wordsLearned}</span>
        <span class="stat-lbl">كلمة مراجعة</span>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✏️</div>
        <span class="stat-val">${stats.exercises}</span>
        <span class="stat-lbl">تمرين</span>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <span class="stat-val">${stats.storiesRead}</span>
        <span class="stat-lbl">قصة مقروءة</span>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <span class="stat-val">${accuracy}%</span>
        <span class="stat-lbl">الدقة</span>
      </div>
    </div>

    <!-- Level Progress Bars -->
    <div class="section-title">التقدم بالمستويات</div>
    <div class="card">
      <div class="strength-list">
        ${levelStats.map(ls => `
          <div class="strength-row">
            <span class="strength-label">${ls.lvl}</span>
            <div class="strength-bar progress-bar">
              <div class="progress-fill blue" style="width:${ls.pct}%"></div>
            </div>
            <span class="strength-pct">${ls.pct}%</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Achievements -->
    <div class="section-title">الإنجازات</div>
    <div class="achievements-grid">
      ${BADGES.map(b => {
        const earned = ach.badges.includes(b.id);
        return `
          <div class="ach-card" style="${earned ? '' : 'opacity:.4;filter:grayscale(1)'}">
            <div class="ach-icon">${b.icon}</div>
            <span class="ach-lbl">${b.label}</span>
          </div>`;
      }).join('')}
    </div>

    <!-- Mistakes -->
    <div class="section-title">أخطائي الشائعة</div>
    ${mistakes.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">🌟</div>
        <div class="empty-text">لا أخطاء مسجلة حتى الآن!</div>
      </div>
    ` : `
      <div class="mistakes-list">
        ${mistakes.map(m => `
          <div class="mistake-item">
            <div class="mistake-head">
              <span class="mistake-type">${m.type === 'word' ? 'كلمة' : 'قاعدة'}</span>
              <span class="mistake-count">❌ ${m.count}</span>
            </div>
            <div class="mistake-word">${m.details?.word || 'غير معروف'}</div>
            <div class="mistake-ar">${m.details?.translation || ''}</div>
          </div>
        `).join('')}
      </div>
    `}

    <div style="height:10px"></div>
  </div>`;
}

function setUserLevel(lvl) {
  state.userLevel = lvl;
  state.learnLevel = lvl;
  save();
  renderTab('profile');
  showToast(`✅ تم تغيير المستوى إلى ${lvl}`, 'success');
}

function confirmReset() {
  if (confirm('هل أنت متأكد؟ سيتم مسح جميع بياناتك نهائياً.')) {
    Object.keys(SK).forEach(k => localStorage.removeItem(SK[k]));
    location.reload();
  }
}

// =========================================================
// PLACEMENT TEST
// =========================================================
let ptSession = { questions: [], answers: {}, currentIndex: 0 };

function startPlacementTest() {
  document.getElementById('bottom-nav').classList.add('hidden');
  ptSession.questions = buildPlacement();
  ptSession.answers = {};
  ptSession.currentIndex = 0;
  renderPlacementIntro();
}

function renderPlacementIntro() {
  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="placement-page">
    <div class="placement-header">
      <div class="placement-badge">
        <span class="material-symbols-rounded" style="font-size:16px">psychology</span>
        اختبار تحديد المستوى
      </div>
      <h1>اكتشف مستواك 🎯</h1>
      <p>سنطرح عليك ${ptSession.questions.length} سؤالاً من مستويات مختلفة لتحديد مستواك الحقيقي في اللغة الإنجليزية.</p>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;gap:10px;align-items:center"><span style="font-size:20px">⏱️</span><span style="font-size:.9rem;color:var(--muted)">يستغرق حوالي 5-10 دقائق</span></div>
        <div style="display:flex;gap:10px;align-items:center"><span style="font-size:20px">📊</span><span style="font-size:.9rem;color:var(--muted)">أسئلة من المستويات A1, A2, B1, B2</span></div>
        <div style="display:flex;gap:10px;align-items:center"><span style="font-size:20px">🎯</span><span style="font-size:.9rem;color:var(--muted)">ستُضبط التمارين بناءً على نتيجتك</span></div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="renderPlacementQuestion()">
      <span class="material-symbols-rounded">play_arrow</span>
      ابدأ الاختبار
    </button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="skipPlacement()">
      تخطي (ابدأ من A1)
    </button>
  </div>`;
}

function renderPlacementQuestion() {
  const s = ptSession;
  if (s.currentIndex >= s.questions.length) {
    renderPlacementResult();
    return;
  }
  const q = s.questions[s.currentIndex];
  const pct = Math.round((s.currentIndex / s.questions.length) * 100);
  const levelColors = { A1:'#4CAF50', A2:'#2196F3', B1:'#FF9800', B2:'#9C27B0' };

  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="placement-page">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div class="quiz-back" onclick="endPlacement()">
        <span class="material-symbols-rounded">close</span>
      </div>
      <div style="flex:1">
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:3px">سؤال ${s.currentIndex+1} من ${s.questions.length}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div style="background:${levelColors[q.level]}22;border:1px solid ${levelColors[q.level]}44;border-radius:var(--r-full);padding:3px 10px;font-size:.75rem;font-weight:700;color:${levelColors[q.level]}">${q.level}</div>
    </div>

    <div class="placement-question">
      <div class="placement-q-text">${q.question}</div>
      <div class="placement-options">
        ${q.options.map(opt => `
          <button class="placement-option ${s.answers[s.currentIndex] === opt ? 'selected' : ''}"
            onclick="selectPlacementAnswer('${escQ(opt)}')">
            ${opt}
          </button>
        `).join('')}
      </div>
    </div>

    <button class="btn btn-primary" style="margin-top:16px" onclick="nextPlacementQuestion()" ${s.answers[s.currentIndex] ? '' : 'disabled style="opacity:.5;cursor:not-allowed"'}>
      ${s.currentIndex < s.questions.length - 1 ? 'التالي' : 'إنهاء الاختبار'}
      <span class="material-symbols-rounded">arrow_back</span>
    </button>
  </div>`;
}

function selectPlacementAnswer(opt) {
  ptSession.answers[ptSession.currentIndex] = opt;
  renderPlacementQuestion();
}

function nextPlacementQuestion() {
  if (!ptSession.answers[ptSession.currentIndex]) return;
  ptSession.currentIndex++;
  renderPlacementQuestion();
}

function renderPlacementResult() {
  const s = ptSession;
  const answersArr = s.questions.map((q, i) => s.answers[i]);
  const result = scorePlacement(answersArr, s.questions);

  const sc = document.getElementById('screen');
  sc.innerHTML = `
  <div class="result-page">
    <div style="font-size:3.5rem">🎯</div>
    <div class="result-score">${result.correct}/${result.total}</div>
    <div class="result-pct">${result.pct}% صحيح</div>
    <div class="result-level-badge">مستواك: ${result.level}</div>
    <p style="color:var(--muted);text-align:center;font-size:.9rem;line-height:1.5">
      ${result.pct >= 80 ? 'ممتاز! مستواك متقدم جداً 🏆' :
        result.pct >= 60 ? 'جيد جداً! أنت في المستوى المتوسط ⭐' :
        result.pct >= 40 ? 'جيد! لديك أساس قوي 💪' :
        'لا بأس! سنبدأ من الأساس معاً 😊'}
    </p>
    <div style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px">
      ${APP_LEVELS.map(lvl => {
        const s2 = result.levelScores[lvl];
        const t = result.levelTotals[lvl];
        const p = t > 0 ? Math.round(s2/t*100) : 0;
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="width:28px;font-weight:700;font-size:.85rem">${lvl}</span>
          <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${p}%"></div></div>
          <span style="font-size:.8rem;color:var(--gold);font-weight:700;width:36px">${s2}/${t}</span>
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="applyPlacementResult('${result.level}')">
      <span class="material-symbols-rounded">check_circle</span>
      ابدأ من المستوى ${result.level}
    </button>
    <button class="btn btn-ghost" style="width:100%" onclick="endPlacement()">
      <span class="material-symbols-rounded">close</span>
      إلغاء
    </button>
  </div>`;
}

function applyPlacementResult(level) {
  state.userLevel = level;
  state.learnLevel = level;
  state.placed = true;
  save();
  showToast(`✅ تم ضبط مستواك على ${level}`, 'success');
  endPlacement();
}

function skipPlacement() {
  state.placed = true;
  save();
  endPlacement();
}

function endPlacement() {
  document.getElementById('bottom-nav').classList.remove('hidden');
  navTo('home');
}

// =========================================================
// APP INIT
// =========================================================
function init() {
  ensureGoals();

  // Show placement test on first launch
  if (!state.placed) {
    document.getElementById('bottom-nav').classList.add('hidden');
    startPlacementTest();
    return;
  }

  document.getElementById('bottom-nav').classList.remove('hidden');
  navTo(state.tab);
}

// Start app
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
