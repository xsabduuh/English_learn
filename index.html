<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة تعلم الإنجليزية</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="screen-root"></div>
    </div>

    <script src="data.js"></script>
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. الثوابت والمفاتيح
            // ============================================================
            const STORAGE = {
                USER_LEVEL: 'eng_user_level',
                PLACEMENT_DONE: 'eng_placement_done',
                REVIEW_ITEMS: 'eng_review_items',
                MISTAKES: 'eng_mistakes',
                DAILY_GOALS: 'eng_daily_goals',
                STATISTICS: 'eng_statistics',
                LAST_SESSION: 'eng_last_session',
                ACHIEVEMENTS: 'eng_achievements',
                WORD_MASTERY: 'eng_word_mastery'
            };

            // ============================================================
            // 2. دوال التخزين المساعدة
            // ============================================================
            function storageGet(key, defaultValue) {
                try {
                    const raw = localStorage.getItem(key);
                    if (raw) return JSON.parse(raw);
                } catch (e) { console.warn('Storage read error:', key, e); }
                return defaultValue;
            }

            function storageSet(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) { console.warn('Storage write error:', key, e); }
            }

            // ============================================================
            // 3. البيانات الافتراضية
            // ============================================================
            function getDefaultReviewItems() {
                const items = {};
                const levels = window.APP_LEVELS || ['A1', 'A2', 'B1', 'B2'];
                levels.forEach(level => {
                    const data = window.APP_DATA[level];
                    if (!data) return;
                    // كلمات
                    (data.words || []).forEach(w => {
                        items[w.id] = {
                            id: w.id,
                            type: 'word',
                            level: level,
                            correctCount: 0,
                            wrongCount: 0,
                            lastReview: null,
                            nextReview: null,
                            easeFactor: 2.5,
                            interval: 0
                        };
                    });
                    // قواعد
                    (data.grammar || []).forEach(g => {
                        items[g.id] = {
                            id: g.id,
                            type: 'grammar',
                            level: level,
                            correctCount: 0,
                            wrongCount: 0,
                            lastReview: null,
                            nextReview: null,
                            easeFactor: 2.5,
                            interval: 0
                        };
                    });
                });
                return items;
            }

            function getDefaultDailyGoals() {
                return {
                    date: new Date().toDateString(),
                    wordsLearned: 0,
                    wordsReviewed: 0,
                    grammarReviewed: 0,
                    storiesRead: 0,
                    exercisesDone: 0,
                    targetWords: 10,
                    targetReviews: 15,
                    completed: false
                };
            }

            function getDefaultStatistics() {
                return {
                    totalWordsLearned: 0,
                    totalGrammarLearned: 0,
                    totalStoriesRead: 0,
                    totalExercises: 0,
                    correctAnswers: 0,
                    wrongAnswers: 0,
                    averageScore: 0,
                    levelScores: { A1: 0, A2: 0, B1: 0, B2: 0 },
                    weakWords: [],
                    weakGrammar: []
                };
            }

            function getDefaultAchievements() {
                return {
                    wordsMastered: 0,
                    grammarMastered: 0,
                    storiesCompleted: 0,
                    daysStreak: 0,
                    maxStreak: 0,
                    xp: 0,
                    level: 1,
                    badges: []
                };
            }

            // ============================================================
            // 4. محرك المراجعة الذكية (Spaced Repetition)
            // ============================================================
            const ReviewEngine = {
                getItems: function() {
                    return storageGet(STORAGE.REVIEW_ITEMS, getDefaultReviewItems());
                },

                saveItems: function(items) {
                    storageSet(STORAGE.REVIEW_ITEMS, items);
                },

                // جلب العناصر المستحقة للمراجعة
                getDueItems: function(limit = 20) {
                    const items = this.getItems();
                    const now = Date.now();
                    const due = [];
                    for (let id in items) {
                        const item = items[id];
                        if (!item.nextReview || item.nextReview <= now) {
                            due.push(item);
                        }
                    }
                    // ترتيب حسب الأولوية (الأكثر خطأ أولاً)
                    due.sort((a, b) => (b.wrongCount - a.wrongCount) || (a.nextReview || 0) - (b.nextReview || 0));
                    return due.slice(0, limit);
                },

                // تحديث عنصر بعد الإجابة
                updateItem: function(id, isCorrect) {
                    const items = this.getItems();
                    const item = items[id];
                    if (!item) return;

                    const now = Date.now();
                    item.lastReview = now;

                    if (isCorrect) {
                        item.correctCount += 1;
                        item.wrongCount = Math.max(0, item.wrongCount - 1);
                        // خوارزمية SM-2 مبسطة
                        if (item.correctCount >= 3) {
                            item.interval = item.interval === 0 ? 1 : Math.min(item.interval * 2, 30);
                        } else {
                            item.interval = item.interval === 0 ? 1 : Math.min(item.interval * 1.5, 30);
                        }
                    } else {
                        item.wrongCount += 1;
                        item.correctCount = 0;
                        item.interval = 1; // تعاد بعد يوم
                        // تسجيل الخطأ في صفحة الأخطاء
                        MistakesEngine.addMistake(id, item.type, item.level);
                    }

                    // حساب موعد المراجعة القادم (بالأيام)
                    const days = Math.max(1, item.interval);
                    item.nextReview = now + (days * 24 * 60 * 60 * 1000);

                    this.saveItems(items);

                    // تحديث الإحصائيات
                    StatisticsEngine.updateStats(id, isCorrect);

                    return item;
                },

                // الحصول على عدد المراجعات المستحقة اليوم
                getDueCount: function() {
                    return this.getDueItems(999).length;
                }
            };

            // ============================================================
            // 5. محرك الأخطاء (My Mistakes)
            // ============================================================
            const MistakesEngine = {
                getMistakes: function() {
                    return storageGet(STORAGE.MISTAKES, []);
                },

                saveMistakes: function(mistakes) {
                    storageSet(STORAGE.MISTAKES, mistakes);
                },

                addMistake: function(itemId, type, level) {
                    const mistakes = this.getMistakes();
                    const existing = mistakes.find(m => m.itemId === itemId);
                    if (existing) {
                        existing.count += 1;
                        existing.lastDate = new Date().toISOString();
                    } else {
                        // الحصول على التفاصيل من البيانات
                        let details = {};
                        const data = window.APP_DATA[level];
                        if (data) {
                            if (type === 'word') {
                                const word = data.words.find(w => w.id === itemId);
                                if (word) details = { word: word.word, translation: word.translation };
                            } else if (type === 'grammar') {
                                const grammar = data.grammar.find(g => g.id === itemId);
                                if (grammar) details = { rule: grammar.rule };
                            }
                        }
                        mistakes.push({
                            itemId: itemId,
                            type: type,
                            level: level,
                            count: 1,
                            firstDate: new Date().toISOString(),
                            lastDate: new Date().toISOString(),
                            details: details
                        });
                    }
                    this.saveMistakes(mistakes);
                },

                getTopMistakes: function(limit = 10) {
                    const mistakes = this.getMistakes();
                    mistakes.sort((a, b) => b.count - a.count);
                    return mistakes.slice(0, limit);
                },

                clearMistake: function(itemId) {
                    let mistakes = this.getMistakes();
                    mistakes = mistakes.filter(m => m.itemId !== itemId);
                    this.saveMistakes(mistakes);
                }
            };

            // ============================================================
            // 6. محرك الإحصائيات
            // ============================================================
            const StatisticsEngine = {
                getStats: function() {
                    return storageGet(STORAGE.STATISTICS, getDefaultStatistics());
                },

                saveStats: function(stats) {
                    storageSet(STORAGE.STATISTICS, stats);
                },

                updateStats: function(itemId, isCorrect) {
                    const stats = this.getStats();
                    if (isCorrect) {
                        stats.correctAnswers += 1;
                    } else {
                        stats.wrongAnswers += 1;
                    }
                    stats.totalExercises += 1;
                    stats.averageScore = Math.round((stats.correctAnswers / stats.totalExercises) * 100);
                    this.saveStats(stats);
                },

                updateLevelScore: function(level, score) {
                    const stats = this.getStats();
                    if (stats.levelScores[level] === undefined) stats.levelScores[level] = 0;
                    stats.levelScores[level] = Math.max(stats.levelScores[level], score);
                    this.saveStats(stats);
                },

                getWeakItems: function() {
                    const mistakes = MistakesEngine.getTopMistakes(20);
                    const stats = this.getStats();
                    stats.weakWords = mistakes.filter(m => m.type === 'word').slice(0, 5);
                    stats.weakGrammar = mistakes.filter(m => m.type === 'grammar').slice(0, 5);
                    return stats;
                }
            };

            // ============================================================
            // 7. محرك الأهداف اليومية
            // ============================================================
            const DailyGoalsEngine = {
                getGoals: function() {
                    let goals = storageGet(STORAGE.DAILY_GOALS, null);
                    const today = new Date().toDateString();
                    if (!goals || goals.date !== today) {
                        goals = getDefaultDailyGoals();
                        goals.date = today;
                        this.saveGoals(goals);
                    }
                    return goals;
                },

                saveGoals: function(goals) {
                    storageSet(STORAGE.DAILY_GOALS, goals);
                },

                updateProgress: function(type) {
                    const goals = this.getGoals();
                    switch (type) {
                        case 'word_learned':
                            goals.wordsLearned += 1;
                            break;
                        case 'word_reviewed':
                            goals.wordsReviewed += 1;
                            break;
                        case 'grammar_reviewed':
                            goals.grammarReviewed += 1;
                            break;
                        case 'story_read':
                            goals.storiesRead += 1;
                            break;
                        case 'exercise':
                            goals.exercisesDone += 1;
                            break;
                    }
                    // التحقق من اكتمال الأهداف
                    if (goals.wordsLearned >= goals.targetWords &&
                        goals.wordsReviewed + goals.grammarReviewed >= goals.targetReviews) {
                        goals.completed = true;
                    }
                    this.saveGoals(goals);
                    return goals;
                },

                getProgress: function() {
                    const goals = this.getGoals();
                    const total = goals.targetWords + goals.targetReviews;
                    const done = goals.wordsLearned + goals.wordsReviewed + goals.grammarReviewed;
                    return {
                        ...goals,
                        percent: total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0,
                        remaining: Math.max(0, total - done)
                    };
                }
            };

            // ============================================================
            // 8. محرك الإنجازات
            // ============================================================
            const AchievementsEngine = {
                getAchievements: function() {
                    return storageGet(STORAGE.ACHIEVEMENTS, getDefaultAchievements());
                },

                saveAchievements: function(ach) {
                    storageSet(STORAGE.ACHIEVEMENTS, ach);
                },

                update: function() {
                    const ach = this.getAchievements();
                    const stats = StatisticsEngine.getStats();
                    const reviewItems = ReviewEngine.getItems();

                    // حساب الكلمات المتقنة (من مراجعة 3+ صحيحة)
                    let mastered = 0;
                    for (let id in reviewItems) {
                        if (reviewItems[id].correctCount >= 3) mastered++;
                    }
                    ach.wordsMastered = mastered;

                    // حساب القواعد المتقنة
                    let grammarMastered = 0;
                    for (let id in reviewItems) {
                        if (reviewItems[id].type === 'grammar' && reviewItems[id].correctCount >= 3) grammarMastered++;
                    }
                    ach.grammarMastered = grammarMastered;

                    // حساب عدد القصص المقروءة من localStorage
                    const readStories = storageGet('eng_read_stories', []);
                    ach.storiesCompleted = readStories.length;

                    // تحديث المستوى (كل 100 XP = مستوى)
                    ach.xp = storageGet('eng_xp', 0);
                    ach.level = Math.floor(ach.xp / 100) + 1;

                    // تحديث السلسلة اليومية
                    const goals = DailyGoalsEngine.getGoals();
                    if (goals.completed) {
                        const streak = storageGet('eng_streak', 0);
                        ach.daysStreak = streak;
                        ach.maxStreak = Math.max(ach.maxStreak, streak);
                    }

                    this.saveAchievements(ach);
                    return ach;
                }
            };

            // ============================================================
            // 9. محرك تحديد المستوى (Placement Test)
            // ============================================================
            const PlacementEngine = {
                isDone: function() {
                    return storageGet(STORAGE.PLACEMENT_DONE, false);
                },

                setDone: function(level) {
                    storageSet(STORAGE.PLACEMENT_DONE, true);
                    storageSet(STORAGE.USER_LEVEL, level);
                },

                generateTest: function() {
                    // نأخذ 20 سؤالاً من جميع المستويات
                    const levels = ['A1', 'A2', 'B1', 'B2'];
                    const questions = [];
                    levels.forEach(level => {
                        const data = window.APP_DATA[level];
                        if (data && data.quizzes) {
                            const qs = data.quizzes.map(q => ({ ...q, level }));
                            questions.push(...qs);
                        }
                    });
                    // خلط واختيار 20
                    const shuffled = questions.sort(() => Math.random() - 0.5);
                    return shuffled.slice(0, 20);
                },

                evaluate: function(answers) {
                    let score = 0;
                    const details = answers.map((a, i) => {
                        const correct = a.correct;
                        if (a.selected === correct) score++;
                        return { ...a, isCorrect: a.selected === correct };
                    });
                    const percentage = Math.round((score / answers.length) * 100);
                    let level = 'A1';
                    if (percentage >= 85) level = 'B2';
                    else if (percentage >= 65) level = 'B1';
                    else if (percentage >= 40) level = 'A2';
                    return { score, total: answers.length, percentage, level, details };
                }
            };

            // ============================================================
            // 10. محرك التمارين (Exercise Engine) - أنواع متعددة
            // ============================================================
            const ExerciseEngine = {
                // توليد تمارين من كلمات/قواعد
                generateExercises: function(items, count = 10) {
                    const exercises = [];
                    const shuffled = items.sort(() => Math.random() - 0.5);
                    const selected = shuffled.slice(0, count);

                    selected.forEach((item, index) => {
                        const type = this.getRandomExerciseType();
                        const exercise = this.createExercise(item, type);
                        if (exercise) exercises.push(exercise);
                    });

                    return exercises;
                },

                getRandomExerciseType: function() {
                    const types = ['translate', 'fill', 'order', 'write', 'correct'];
                    return types[Math.floor(Math.random() * types.length)];
                },

                createExercise: function(item, type) {
                    const data = window.APP_DATA[item.level];
                    if (!data) return null;

                    if (item.type === 'word') {
                        const word = data.words.find(w => w.id === item.id);
                        if (!word) return null;
                        return this.createWordExercise(word, type);
                    } else if (item.type === 'grammar') {
                        const grammar = data.grammar.find(g => g.id === item.id);
                        if (!grammar) return null;
                        return this.createGrammarExercise(grammar, type);
                    }
                    return null;
                },

                createWordExercise: function(word, type) {
                    switch (type) {
                        case 'translate':
                            return {
                                type: 'translate',
                                question: `ما هي ترجمة "${word.word}"؟`,
                                correct: word.translation,
                                options: this.generateOptions(word.translation, 'translation', word.level)
                            };
                        case 'fill':
                            if (word.example) {
                                const parts = word.example.split(word.word);
                                if (parts.length > 1) {
                                    return {
                                        type: 'fill',
                                        question: `أكمل: ${parts[0]}______${parts.slice(1).join('')}`,
                                        correct: word.word
                                    };
                                }
                            }
                            return null;
                        case 'write':
                            return {
                                type: 'write',
                                question: `اكتب "${word.translation}" بالإنجليزية:`,
                                correct: word.word
                            };
                        case 'order':
                            if (word.example) {
                                const words = word.example.split(' ');
                                const shuffled = [...words].sort(() => Math.random() - 0.5);
                                return {
                                    type: 'order',
                                    question: 'رتب الكلمات لتكوين جملة:',
                                    words: shuffled,
                                    correct: word.example
                                };
                            }
                            return null;
                        case 'correct':
                            if (word.example) {
                                const wrong = word.example.replace(word.word, word.word + 'ss');
                                return {
                                    type: 'correct',
                                    question: `صحح الخطأ: "${wrong}"`,
                                    correct: word.example
                                };
                            }
                            return null;
                        default:
                            return null;
                    }
                },

                createGrammarExercise: function(grammar, type) {
                    return {
                        type: 'translate',
                        question: `ما هي قاعدة "${grammar.rule}"؟ (اختر أفضل ترجمة)`,
                        correct: grammar.rule,
                        options: this.generateOptions(grammar.rule, 'rule', grammar.level)
                    };
                },

                generateOptions: function(correct, field, level) {
                    const data = window.APP_DATA[level];
                    const pool = [];
                    if (field === 'translation') {
                        (data.words || []).forEach(w => { if (w.translation) pool.push(w.translation); });
                    } else if (field === 'rule') {
                        (data.grammar || []).forEach(g => { if (g.rule) pool.push(g.rule); });
                    }
                    const options = new Set();
                    options.add(correct);
                    for (let i = 0; i < pool.length && options.size < 4; i++) {
                        if (pool[i] !== correct && !options.has(pool[i])) {
                            options.add(pool[i]);
                        }
                    }
                    while (options.size < 4) {
                        options.add(`??? ${Math.random().toString(36).substring(2, 4)}`);
                    }
                    return Array.from(options).sort(() => Math.random() - 0.5);
                },

                checkAnswer: function(exercise, userAnswer) {
                    if (exercise.type === 'order') {
                        return userAnswer.trim() === exercise.correct.trim();
                    }
                    return userAnswer.trim().toLowerCase() === exercise.correct.trim().toLowerCase();
                }
            };

            // ============================================================
            // 11. قارئ القصص التفاعلي
            // ============================================================
            const StoryReader = {
                getStories: function(level) {
                    const data = window.APP_DATA[level];
                    return data ? data.stories || [] : [];
                },

                getStory: function(level, storyId) {
                    const stories = this.getStories(level);
                    return stories.find(s => s.id === storyId) || null;
                },

                // تسجيل قراءة قصة
                markAsRead: function(storyId) {
                    const read = storageGet('eng_read_stories', []);
                    if (!read.includes(storyId)) {
                        read.push(storyId);
                        storageSet('eng_read_stories', read);
                        DailyGoalsEngine.updateProgress('story_read');
                        AchievementsEngine.update();
                    }
                },

                // تفسير كلمة (معنى + نطق)
                getWordMeaning: function(word, level) {
                    const data = window.APP_DATA[level];
                    if (!data) return null;
                    const found = data.words.find(w => w.word.toLowerCase() === word.toLowerCase());
                    if (found) {
                        return {
                            word: found.word,
                            translation: found.translation,
                            example: found.example || ''
                        };
                    }
                    return null;
                }
            };

            // ============================================================
            // 12. واجهة المستخدم (UI) - إعادة تصميم كاملة
            // ============================================================
            const UI = {
                root: document.getElementById('screen-root'),
                currentScreen: 'home',
                currentLevel: null,
                currentExerciseIndex: 0,
                currentExercises: [],
                currentStory: null,

                // ===== الشاشة الرئيسية =====
                renderHome: function() {
                    const level = storageGet(STORAGE.USER_LEVEL, 'A1');
                    const streak = storageGet('eng_streak', 0);
                    const xp = storageGet('eng_xp', 0);
                    const ach = AchievementsEngine.getAchievements();
                    const goals = DailyGoalsEngine.getProgress();
                    const dueCount = ReviewEngine.getDueCount();
                    const lastSession = storageGet(STORAGE.LAST_SESSION, null);
                    const mistakes = MistakesEngine.getMistakes();

                    // اقتراح الدرس التالي
                    const nextLesson = this.getNextLesson(level);

                    let html = `
                        <div class="home-container">
                            <!-- شريط المستوى والسلسلة -->
                            <div class="top-bar">
                                <div class="level-badge">
                                    <span class="material-symbols-outlined">account_circle</span>
                                    <span>${level}</span>
                                </div>
                                <div class="streak-badge">
                                    <span class="material-symbols-outlined">local_fire_department</span>
                                    <span>${streak}</span>
                                </div>
                                <div class="xp-badge">
                                    <span class="material-symbols-outlined">stars</span>
                                    <span>${xp}</span>
                                </div>
                            </div>

                            <!-- الترحيب -->
                            <div class="welcome-section">
                                <h1>مرحباً بك 👋</h1>
                                <p>${dueCount > 0 ? `لديك ${dueCount} عناصر للمراجعة اليوم` : 'أنت في طريقك لإتقان الإنجليزية!'}</p>
                            </div>

                            <!-- بطاقة الاستمرار -->
                            <div class="continue-card">
                                <div class="continue-header">
                                    <span class="material-symbols-outlined">play_arrow</span>
                                    <span>متابعة التعلم</span>
                                </div>
                                ${lastSession ? `
                                    <div class="continue-detail">
                                        <span>آخر درس: ${lastSession.level} - ${lastSession.type || 'تمرين'}</span>
                                        <span class="continue-time">${lastSession.date ? new Date(lastSession.date).toLocaleDateString() : ''}</span>
                                    </div>
                                ` : `
                                    <div class="continue-detail">
                                        <span>ابدأ رحلتك التعليمية</span>
                                    </div>
                                `}
                                <button class="btn-continue" onclick="App.startLearning()">
                                    <span class="material-symbols-outlined">arrow_forward</span>
                                    استمر
                                </button>
                            </div>

                            <!-- الأهداف اليومية -->
                            <div class="daily-goal">
                                <div class="daily-header">
                                    <span class="material-symbols-outlined">today</span>
                                    <span>أهداف اليوم</span>
                                    <span class="daily-percent">${goals.percent}%</span>
                                </div>
                                <div class="daily-bar-bg">
                                    <div class="daily-bar-fill" style="width: ${goals.percent}%;"></div>
                                </div>
                                <div class="daily-details">
                                    <span>📖 ${goals.wordsLearned}/${goals.targetWords} كلمات</span>
                                    <span>🔄 ${goals.wordsReviewed + goals.grammarReviewed}/${goals.targetReviews} مراجعات</span>
                                </div>
                                ${goals.completed ? '<div class="daily-complete">🎉 أحسنت! أكملت أهداف اليوم</div>' : ''}
                            </div>

                            <!-- المراجعة المستحقة -->
                            ${dueCount > 0 ? `
                                <div class="review-alert" onclick="App.startReview()">
                                    <span class="material-symbols-outlined">sync</span>
                                    <span>${dueCount} عنصر بحاجة للمراجعة</span>
                                    <span class="material-symbols-outlined">chevron_left</span>
                                </div>
                            ` : ''}

                            <!-- أخطائي -->
                            ${mistakes.length > 0 ? `

                getNextLesson: function(level) {
                    const data = window.APP_DATA[level];
                    if (!data) return 'ابدأ بتعلم كلمات جديدة';

                    // نبحث عن كلمات لم تتقن بعد
                    const reviewItems = ReviewEngine.getItems();
                    const mastered = new Set();
                    for (let id in reviewItems) {
                        if (reviewItems[id].correctCount >= 3) mastered.add(id);
                    }

                    const nextWord = data.words.find(w => !mastered.has(w.id));
                    if (nextWord) {
                        return `تعلم كلمة جديدة: "${nextWord.word}" (${nextWord.translation})`;
                    }

                    const nextGrammar = data.grammar.find(g => !mastered.has(g.id));
                    if (nextGrammar) {
                        return `تعلم قاعدة جديدة: ${nextGrammar.rule}`;
                    }

                    return 'راجع ما تعلمته أو انتقل لمستوى أعلى';
                },

                // ===== بدء التعلم (جلسة تفاعلية) =====
                renderLearningSession: function() {
                    const level = storageGet(STORAGE.USER_LEVEL, 'A1');
                    const dueItems = ReviewEngine.getDueItems(5);

                    // إذا كان هناك مراجعات مستحقة، نبدأ بها
                    if (dueItems.length > 0) {
                        this.currentExercises = ExerciseEngine.generateExercises(dueItems, Math.min(5, dueItems.length));
                    } else {
                        // خلاف ذلك، نتعلم كلمات جديدة
                        const data = window.APP_DATA[level];
                        if (!data) {
                            this.renderHome();
                            return;
                        }
                        const reviewItems = ReviewEngine.getItems();
                        const mastered = new Set();
                        for (let id in reviewItems) {
                            if (reviewItems[id].correctCount >= 3) mastered.add(id);
                        }
                        const newWords = data.words.filter(w => !mastered.has(w.id));
                        const selected = newWords.slice(0, 5);
                        const items = selected.map(w => ({
                            id: w.id,
                            type: 'word',
                            level: level
                        }));
                        this.currentExercises = ExerciseEngine.generateExercises(items, items.length);
                    }

                    if (this.currentExercises.length === 0) {
                        this.renderHome();
                        return;
                    }

                    this.currentExerciseIndex = 0;
                    this.renderExercise();
                },

                checkExercise: function(userAnswer) {
                    const exercise = UI.currentExercises[UI.currentExerciseIndex];
                    if (!exercise) return;

                    const isCorrect = ExerciseEngine.checkAnswer(exercise, userAnswer);
                    const itemId = exercise._itemId || 'unknown';

                    // تحديث نظام المراجعة
                    const reviewItems = ReviewEngine.getItems();
                    let item = reviewItems[itemId];
                    if (item) {
                        ReviewEngine.updateItem(itemId, isCorrect);
                    }

                    // تحديث الأهداف اليومية
                    if (isCorrect) {
                        DailyGoalsEngine.updateProgress('word_learned');
                        DailyGoalsEngine.updateProgress('exercise');
                        // منح XP
                        let xp = storageGet('eng_xp', 0);
                        xp += 10;
                        storageSet('eng_xp', xp);
                    } else {
                        DailyGoalsEngine.updateProgress('exercise');
                    }

                    // عرض التغذية الراجعة
                    this.showFeedback(isCorrect);

                    // الانتقال للتمرين التالي بعد تأخير

                        UI.currentExerciseIndex++;

                    feedback.className = `feedback-popup ${isCorrect ? 'correct' : 'wrong'}`;
                    feedback.innerHTML = `
                        <span class="material-symbols-outlined">${isCorrect ? 'check_circle' : 'cancel'}</span>
                        <span>${isCorrect ? 'صحيح! +10 XP' : 'خطأ، حاول مجدداً'}</span>
                    `;
                    document.body.appendChild(feedback);
                    setTimeout(() => {
                        feedback.style.opacity = '0';
                        feedback.style.transform = 'translateY(-20px)';
                        setTimeout(() => feedback.remove(), 300);
                    }, 1000);
                },

                // ===== مراجعة خطأ معين =====
                reviewMistake: function(itemId) {
                    const mistakes = MistakesEngine.getMistakes();
                    const mistake = mistakes.find(m => m.itemId === itemId);
                    if (!mistake) return;

                    // نبحث عن العنصر في البيانات
                    const data = window.APP_DATA[mistake.level];
                    if (!data) return;

                    let item = null;
                    if (mistake.type === 'word') {
                        item = data.words.find(w => w.id === itemId);
                    } else if (mistake.type === 'grammar') {
                        item = data.grammar.find(g => g.id === itemId);
                    }

                    if (!item) return;

                    // نضعه في جلسة تعلم
                    const exercise = ExerciseEngine.createExercise({
                        id: itemId,
                        type: mistake.type,
                        level: mistake.level
                    }, 'translate');

                    if (exercise) {
                        UI.currentExercises = [exercise];
                        UI.currentExerciseIndex = 0;
                        UI.renderExercise();
                    }
                },

                // ===== القصص =====
                showWordMeaning: function(word, level) {
                    const meaning = StoryReader.getWordMeaning(word, level);
                    const tooltip = document.getElementById('storyTooltip');
                    if (!tooltip || !meaning) return;

                    tooltip.style.display = 'block';
                    tooltip.innerHTML = `
                        <div class="tooltip-content">
                            <strong>${meaning.word}</strong>
                            <span>${meaning.translation}</span>
                            ${meaning.example ? `<span style="color:#888;font-size:0.85rem;">${meaning.example}</span>` : ''}
                            <button onclick="App.speak('${meaning.word}')" class="btn-sm">
                                <span class="material-symbols-outlined">volume_up</span>
                            </button>
                        </div>
                    `;
                    tooltip.style.position = 'fixed';
                    tooltip.style.bottom = '20%';
                    tooltip.style.left = '50%';
                    tooltip.style.transform = 'translateX(-50%)';
                    tooltip.style.width = '90%';
                    tooltip.style.maxWidth = '400px';
                    tooltip.style.backgroundColor = '#1E1E1E';
                    tooltip.style.border = '1px solid #F5B041';
                    tooltip.style.borderRadius = '16px';
                    tooltip.style.padding = '16px';
                    tooltip.style.zIndex = '999';

                    // إغلاق عند النقر خارجها
                    setTimeout(() => {
                        document.addEventListener('click', function closeTooltip(e) {
                            if (!tooltip.contains(e.target) && e.target.className !== 'story-word') {
                                tooltip.style.display = 'none';
                                document.removeEventListener('click', closeTooltip);
                            }
                        });
                    }, 100);
                },

                finishStory: function(storyId) {
                    StoryReader.markAsRead(storyId);
                    this.goToStories();
                },

                // ===== النطق =====
                speak: function(text) {
                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        speechSynthesis.speak(utterance);
                    } else {
                        alert('متصفحك لا يدعم النطق الصوتي');
                    }
                },

                // ===== تهيئة التطبيق =====
                init: function() {
                    // التحقق من البيانات
                    if (!window.APP_DATA) {
                        document.getElementById('screen-root').innerHTML = `
                            <div style="padding:40px;color:red;text-align:center;">
                                خطأ: ملف البيانات غير موجود
                            </div>
                        `;
                        return;
                    }

                    // اختبار تحديد المستوى
                    if (!PlacementEngine.isDone()) {
                        this.runPlacementTest();
                        return;
                    }

                    // تحديث الإنجازات
                    AchievementsEngine.update();

                    // عرض الصفحة الرئيسية
                    this.goHome();
                },

                // ===== اختبار تحديد المستوى =====
                runPlacementTest: function() {
    const questions = PlacementEngine.generateTest();
    let html = `
        <div class="page-container">
            <div class="page-header">
                <h2>اختبار تحديد المستوى</h2>
                <span class="material-symbols-outlined" style="color:#F5B041;">quiz</span>
            </div>
            <p style="color:#AAAAAA;margin-bottom:16px;">أجب عن الأسئلة التالية لتحديد مستواك المناسب</p>
            <div id="placementQuestions"></div>
            <button class="btn-primary" onclick="App.submitPlacement()" id="placementSubmit">
                <span class="material-symbols-outlined">check</span> إنهاء الاختبار
            </button>
        </div>
    `;
    document.getElementById('screen-root').innerHTML = html;

    const container = document.getElementById('placementQuestions');
    const answers = [];

    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'placement-question';
        div.innerHTML = `
            <div class="placement-q">${i+1}. ${q.question}</div>
            <div class="placement-options" id="options_${i}">
                <!-- سيتم إضافة الأزرار برمجياً -->
            </div>
            <input type="hidden" id="placement_${i}" value="">
        `;
        container.appendChild(div);

        // إنشاء الأزرار برمجياً وربطها بالحدث
        const optionsContainer = document.getElementById(`options_${i}`);
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.dataset.value = opt;
            btn.addEventListener('click', function() {
                App.selectPlacementAnswer(i, opt);
            });
            optionsContainer.appendChild(btn);
        });

        answers.push({ ...q, selected: null });
    });

    window._placementAnswers = answers;
    window._placementQuestions = questions;
},

                    // تمييز الزر المختار
                    const container = document.getElementById('placementQuestions');
                    const questionDiv = container.children[index];
                    const buttons = questionDiv.querySelectorAll('.option-btn');
                    buttons.forEach(btn => {
                        btn.style.borderColor = btn.textContent === value ? '#F5B041' : '#2A2A2A';
                        btn.style.background = btn.textContent === value ? 'rgba(245, 176, 65, 0.2)' : '#1E1E1E';
                    });

                    // تحديث الحقل المخفي
                    document.getElementById(`placement_${index}`).value = value;
                },

                submitPlacement: function() {
                    const answers = window._placementAnswers;
                    if (!answers) return;

                    // التحقق من الإجابة على جميع الأسئلة
                    const unanswered = answers.filter(a => !a.selected);
                    if (unanswered.length > 0) {
                        alert(`يرجى الإجابة على جميع الأسئلة (${unanswered.length} متبقية)`);
                        return;
                    }

                    const result = PlacementEngine.evaluate(answers);
                    PlacementEngine.setDone(result.level);

                    // عرض النتيجة
                    let html = `
                        <div class="page-container">
                            <div class="page-header">
                                <h2>نتيجة الاختبار</h2>
                                <span class="material-symbols-outlined" style="color:#F5B041;">score</span>
                            </div>
                            <div class="result-card">
                                <div class="result-score">${result.percentage}%</div>
                                <div class="result-detail">${result.score} من ${result.total} إجابات صحيحة</div>
                                <div class="result-level">المستوى المحدد: <strong>${result.level}</strong></div>
                            </div>
                            <button class="btn-primary" onclick="App.goHome()">
                                <span class="material-symbols-outlined">arrow_forward</span>
                                ابدأ التعلم
                            </button>
                        </div>
                    `;
                    document.getElementById('screen-root').innerHTML = html;

                    // تحديث الإحصائيات
                    StatisticsEngine.updateLevelScore(result.level, result.percentage);
                }
            };

            // ============================================================
            // 14. بدء التشغيل
            // ============================================================
            document.addEventListener('DOMContentLoaded', function() {
                window.App.init();
            });

        })();
    </script>
</body>
</html>
